name: Bug report
description: Report a bug (incorrect behaviors) of GSIM.
labels:
  - 'type: bug/reported'
  - 'module: unknown'
body:
  - type: markdown
    attributes:
      value: |
        You could use English or Chinese to open an issue.
        您可以使用中文或英文提问，我们推荐使用英文。

        This template is only used for reporting a bug (incorrect behaviors) of GSIM. If this doesn't look right, please go back and choose another template.
        这个 issue 模板仅用于提报 GSIM 不正确的行为。如果您遇到的不是此类问题，请回退并选择其他模板。

        Please make sure that the incorrect behaviors can still be reproduced on the latest commit of the corresponding branch.
        请确保不正确的行为在相应分支最新的 commit 仍能复现。

        Please fill in the following information so we can better understand and address your issue. Thank you!
        请填写以下内容，以便我们更好地理解和处理您的问题。谢谢！
  - type: checkboxes
    id: before-start
    attributes:
      label: Before start
      description: |
        Before start, PLEASE MAKE SURE you have done these:
        开始之前，请确保您已经做过以下事情：
      options:
        - label: I confirm that this is a bug of GSIM, rather than a usage problem or other types of problems. 我确认这是一个 GSIM 的 bug，而不是使用上的问题或者其他类型的问题。
          required: true
        - label: I have searched the previous issues and did not find anything relevant. 我已经搜索过之前的 issue，并没有找到相关的。
          required: true
        - label: I have reviewed the commit messages from the relevant commit history. 我已经浏览过相关的提交历史和提交信息。
          required: true
        - label: I have reproduced the incorrect behaviors using the latest commit on the corresponding branch. 我已经使用相应分支最新的 commit 复现了不正确的行为。
          required: true
  - type: dropdown
    id: branch
    attributes:
      label: Branch
      description: |
        Please select the branch you are using.
        请选择您使用的分支。
      options:
        - master
        - Other (please specify in "Additional context" section)
    validations:
      required: true
  - type: textarea
    id: describe
    attributes:
      label: Describe the bug
      description: |
        A clear and concise description of what the bug is.
        请清晰、准确地描述这一缺陷。

        If applicable, add screenshots / logs to help explain the bug.
        如果可能，请提供有助于您描述问题的屏幕截图和日志。

        Please upload logs as attachments, do not paste them directly into the text box.
        请使用附件的形式上传日志，不要直接粘贴到文本框中。
      placeholder:
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: |
        A clear and concise description of what you expected to happen.
        请清晰、准确地描述期望的行为。
      placeholder:
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Please provide your environment information.
        请提供您的环境信息。
      placeholder:
      value: |
        - Hardware
          - CPU:
          - Memory (GB):
          - Storage (GB):
        - Software
          - Operating system:
          - gcc version: <!-- run `gcc --version 2>&1 | head -n 1` to get the version -->
          - clang version: <!-- run `clang --version 2>&1 | head -n 1` to get the version, only needed when you use clang -->
          - java version: <!-- run `java -version 2>&1 | head -n 1` to get the version -->
          - mill version: <!-- run `mill -i --version 2>&1 | head -n 1` to get the version -->
        - Repo
          - GSIM commit id: ``
          - XiangShan commit id (if GSIM failed on XiangShan): ``
        - Build & Run
          - Build command: ``
          - Run command (if applicable): ``
          - Also upload workload (binary and source code) in "To Reproduce" section if applicable.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: To Reproduce
      description: |
        Steps to reproduce the bug, along with a corresponding minimal workload (source code, binary, and a brief description).
        复现该问题的步骤，以及对应的最小测试用例（包含源码、二进制文件和简要说明）。

        If this issue was found while simulating XiangShan and it is difficult to provide a minimal test case, please at least provide a GitHub link showing the minimal changes between the most recent known-good XiangShan commit and the version that triggers the issue, so that we can locate the problem more quickly.
        如果该问题是在仿真香山时发现的，且难以提供最小测试用例，请至少提供一个 GitHub 链接，给出从最近一次可正常工作的香山提交到出现问题的版本之间的最小修改，以帮助我们更快定位问题。

        We strongly prefer a minimal test case that reproduces the issue, rather than a large test case with many unrelated features. A minimal test case usually helps us locate and fix the issue more quickly. You can use [gsim-playground](https://github.com/Wolf-Tungsten/gsim-chisel7-playground) to build and test your minimal test case.
        我们更希望您提供能够复现该问题的最小测试用例，而不是体量较大、包含许多无关功能的测试用例。最小测试用例通常能帮助我们更快地定位并修复问题。您可以使用 [gsim-playground](https://github.com/Wolf-Tungsten/gsim-chisel7-playground) 来构建和测试您的最小测试用例。
      placeholder:
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: |
        Add any other context about the problem here.
        可在此处附上其他相关信息。

        For example, your guess about the cause of the bug, or the modules that may be related.
        例如，您对 bug 可能原因的猜测，或者可能与 bug 相关的模块。

        If possible, you can also try to solve the problem yourself using AI-assisted coding or other approaches, and submit a PR to fix it.
        如果可能，您也可以尝试通过 AI 辅助编码或其他方式自行解决该问题，并提交 PR 来修复它。
      placeholder:
    validations:
      required: false
